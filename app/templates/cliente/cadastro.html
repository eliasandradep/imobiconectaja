<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — {{ imob.nome }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background:#f5f7fa; font-family:'Segoe UI',system-ui,sans-serif; }
    .card-portal { border:none; border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,.1); }
    .topo { background:linear-gradient(135deg,#0d1b2a 0%,#1b4332 100%); color:#fff; border-radius:20px 20px 0 0; padding:2rem; text-align:center; }
    .btn-primary { background:#1b4332; border:none; } .btn-primary:hover { background:#0d2a1f; }
    .form-control:focus { border-color:#1b4332; box-shadow:0 0 0 3px rgba(27,67,50,.15); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
<div class="container" style="max-width:440px;">
  <div class="card-portal">
    <div class="topo">
      <h5 class="fw-bold mb-1">Novo cadastro</h5>
      <p class="mb-0 small opacity-75">CPF: {{ cpf[:3] }}.{{ cpf[3:6] }}.{{ cpf[6:9] }}-{{ cpf[9:] }}</p>
    </div>
    <div class="p-4">
      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in msgs %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-bold small">Nome completo *</label>
          <input type="text" name="nome" class="form-control" placeholder="Seu nome completo" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold small">WhatsApp</label>
          <input type="tel" name="telefone" class="form-control" placeholder="(11) 99999-9999">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold small">E-mail</label>
          <input type="email" name="email" class="form-control" placeholder="seu@email.com">
        </div>
        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">
          Continuar <i class="bi bi-arrow-right ms-1"></i>
        </button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
