<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Concluído — {{ imob.nome }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>body{background:#f5f7fa;font-family:'Segoe UI',system-ui,sans-serif;}</style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
<div class="container text-center" style="max-width:480px;">
  <div class="card border-0 rounded-4 shadow p-5">
    <div class="mb-3">
      <i class="bi bi-check-circle-fill text-success" style="font-size:4rem;"></i>
    </div>
    <h3 class="fw-bold">Imóvel cadastrado!</h3>
    <p class="text-muted mt-2">
      Nossa equipe analisará as informações e entrará em contato em breve.
      Obrigado por confiar na <strong>{{ imob.nome }}</strong>.
    </p>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <a href="{{ url_for('site.index') }}" class="btn btn-outline-secondary mt-2">
      <i class="bi bi-house me-1"></i> Ir para o site
    </a>
  </div>
</div>
</body>
</html>
